<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 250px; background: #16213e; border-right: 1px solid #0f3460; padding: 20px; }
    .sidebar h2 { font-size: 18px; margin-bottom: 20px; color: #e94560; }
    .instance-list { list-style: none; }
    .instance-item { padding: 10px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
    .instance-item:hover { background: #0f3460; }
    .instance-item.active { background: #e94560; }
    .main { flex: 1; padding: 30px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 24px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #e94560; color: white; }
    .btn-secondary { background: #0f3460; color: white; }
    .status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status-running { background: #00c853; color: white; }
    .status-stopped { background: #666; color: white; }
    .status-error { background: #ff5252; color: white; }
    .card { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h3 { margin-bottom: 15px; }
    .actions { display: flex; gap: 10px; }
    .placeholder { text-align: center; padding: 60px; color: #666; }
    .loading { text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <h2>🦞 OpenClaw</h2>
      <ul class="instance-list" id="instanceList"></ul>
      <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="createInstance()">+ New Instance</button>
    </div>
    <div class="main" id="mainContent">
      <div class="placeholder">
        <p>Select an instance or create a new one</p>
      </div>
    </div>
  </div>

  <script>
    let instances = [];

    async function loadInstances() {
      instances = await window.openclaw.getInstances();
      renderInstanceList();
    }

    function renderInstanceList() {
      const list = document.getElementById('instanceList');
      list.innerHTML = instances.map(i => `
        <li class="instance-item" onclick="selectInstance('${i.id}')">
          <div>${i.name}</div>
          <span class="status status-${i.status}">${i.status}</span>
        </li>
      `).join('');
    }

    async function createInstance() {
      const name = prompt('Instance name:', 'shrimp-' + Date.now());
      if (name) {
        await window.openclaw.createInstance({ name });
        loadInstances();
      }
    }

    async function selectInstance(id) {
      const instance = instances.find(i => i.id === id);
      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div class="header">
          <h1>${instance.name}</h1>
          <div>
            <button class="btn btn-secondary" onclick="window.openclaw.openDashboard('${id}')">Open Dashboard</button>
          </div>
        </div>
        <div class="card">
          <h3>Status</h3>
          <p><span class="status status-${instance.status}">${instance.status}</span></p>
          <p style="margin-top: 10px;">Port: ${instance.port}</p>
        </div>
        <div class="card">
          <h3>Actions</h3>
          <div class="actions">
            ${instance.status === 'running' 
              ? `<button class="btn btn-secondary" onclick="stopInstance('${id}')">Stop</button>`
              : `<button class="btn btn-primary" onclick="startInstance('${id}')">Start</button>`}
            <button class="btn btn-secondary" onclick="window.openclaw.openConfig('${id}')">Config</button>
            <button class="btn btn-secondary" onclick="window.openclaw.openLogs('${id}')">Logs</button>
          </div>
        </div>
      `;
    }

    async function startInstance(id) {
      await window.openclaw.startInstance(id);
      loadInstances();
    }

    async function stopInstance(id) {
      await window.openclaw.stopInstance(id);
      loadInstances();
    }

    window.openclaw.onStateUpdate((updated) => {
      instances = updated;
      renderInstanceList();
    });

    loadInstances();
  </script>
</body>
</html>
